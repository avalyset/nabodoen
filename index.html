    {id:45,navn:"Tor A.",emoji:"🧓",gate:"Gressholmen kai",omrade:"gressholmen",omradeNavn:"⛵ Gressholmen",dist:"på øya",rating:"4.8",besok:15,open:true,tags:["Åpen nå","Hotzone","💗 Hjertestarter","🩺 Kan førstehjelp","🚰 Fyll vannflaske"],notat:"Pensjonert lege. Hjertestarter og førstehjelp på øya.",reviews:[{tekst:"Trygg lege på øya! ⭐⭐⭐⭐⭐",dato:"3 dager siden"}]},
    {id:46,navn:"Nina K.",emoji:"👩🏽",gate:"Bleikøya vest",omrade:"bleikoya",omradeNavn:"⛵ Bleikøya",dist:"på øya",rating:"4.9",besok:11,open:true,tags:["Åpen nå","Hotzone","🎵 Musikk og stemning","🎸 Lån en gitar","🛋️ Lån et pledd"],notat:"Kunstner på Bleikøya. Gitar, musikk og pledd. Velkommen!",reviews:[{tekst:"Kunstner-vert på Bleikøya! ⭐⭐⭐⭐⭐",dato:"i dag"}]},
    {id:47,navn:"Pål O.",emoji:"👨🏻",gate:"Lindøya brygge",omrade:"lindoya",omradeNavn:"⛵ Lindøya",dist:"på øya",rating:"4.7",besok:18,open:true,tags:["Åpen nå","Hotzone","🧊 Kjøl medbrakt drikke","🏸 Lån badminton","⚽ Bli med å spille"],notat:"Lindøya-beboer. Badminton og kjøleskap. Det gule huset.",reviews:[{tekst:"Sport og sol på Lindøya! ⭐⭐⭐⭐⭐",dato:"2 dager siden"}]}
  ];

  // ─── FERRY ───────────────────────────────────────────────────────────
  const ferryRoutes = {
    bygdoy:      {linje:"B9",navn:"Bygdøy",tider:["10:00","10:30","11:00","11:30","12:00","12:30","13:00","13:30","14:00","15:00","16:00","17:00","18:00"]},
    hovedoya:    {linje:"B1",navn:"Hovedøya",tider:["09:30","10:00","10:30","11:00","11:30","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00"]},
    langoyene:   {linje:"B2",navn:"Langøyene",tider:["09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00"]},
    nakholmen:   {linje:"B3",navn:"Nakholmen",tider:["09:45","10:45","11:45","12:45","13:45","14:45","15:45","16:45","17:45","18:45"]},
    gressholmen: {linje:"B1",navn:"Gressholmen",tider:["09:30","10:30","11:30","12:30","13:30","14:30","15:30","16:30","17:30","18:30"]},
    bleikoya:    {linje:"B3",navn:"Bleikøya",tider:["10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00"]},
    lindoya:     {linje:"B2",navn:"Lindøya",tider:["09:00","10:30","12:00","13:30","15:00","16:30","18:00"]},
    heggholmen:  {linje:"B3",navn:"Heggholmen",tider:["10:00","11:30","13:00","14:30","16:00","17:30"]},
    ulvoya:      {linje:"B9",navn:"Ulvøya",tider:["09:30","11:00","12:30","14:00","15:30","17:00","18:30"]}
  };

  function showFerry(omrade) {
    const panel = document.getElementById('ferry-panel');
    const route = ferryRoutes[omrade];
    if (!route) { panel.style.display = 'none'; return; }
    panel.style.display = 'block';
    document.getElementById('ferry-title').textContent = route.linje + ' → ' + route.navn + ' (fra Aker Brygge)';
    document.getElementById('ferry-updated').textContent = 'Oppdatert: ' + new Date().toLocaleTimeString('nb-NO', {hour:'2-digit',minute:'2-digit'});
    const nowMins = new Date().getHours() * 60 + new Date().getMinutes();
    document.getElementById('ferry-times').innerHTML = route.tider.map(function(t) {
      const parts = t.split(':');
      const diff = parseInt(parts[0]) * 60 + parseInt(parts[1]) - nowMins;
      let status, color, bg;
      if (diff < 0) { status = 'Gått'; color = '#999'; bg = 'rgba(255,255,255,0.05)'; }
      else if (diff <= 15) { status = 'Om ' + diff + ' min'; color = '#fbbf24'; bg = 'rgba(251,191,36,0.15)'; }
      else if (diff <= 45) { status = diff + ' min'; color = '#34d399'; bg = 'rgba(52,211,153,0.15)'; }
      else { status = t; color = 'rgba(168,213,255,0.7)'; bg = 'rgba(255,255,255,0.05)'; }
      return '<div style="background:' + bg + ';border:0.5px solid rgba(255,255,255,0.1);border-radius:10px;padding:8px 12px;text-align:center;min-width:72px;"><div style="font-size:15px;font-weight:500;color:#fff;">' + t + '</div><div style="font-size:11px;color:' + color + ';">' + status + '</div></div>';
    }).join('');
  }

  // ─── STATE & FILTER ──────────────────────────────────────────────────
  var aktivtOmrade = 'alle';

  function filterSted(val) {
    document.getElementById('tilbud-select').value = 'alle';
    document.getElementById('search-input').value = '';
    aktivtOmrade = val;
    showFerry(val);
    renderListings();
  }

  function filterTilbud(val) {
    document.getElementById('sted-select').value = 'alle';
    document.getElementById('search-input').value = '';
    aktivtOmrade = 'tag_' + val;
    renderListings();
  }

  function searchVerter() {
    var q = document.getElementById('search-input').value.toLowerCase();
    if (!q) { aktivtOmrade = 'alle'; renderListings(); return; }
    var filtered = verter.filter(function(v) {
      return v.tags.some(function(t) { return t.toLowerCase().includes(q); }) ||
             v.navn.toLowerCase().includes(q) ||
             v.omradeNavn.toLowerCase().includes(q) ||
             v.notat.toLowerCase().includes(q);
    });
    var container = document.getElementById('listings-container');
    container.innerHTML = filtered.length ? filtered.map(renderVert).join('') :
      '<p style="color:var(--text-muted);padding:2rem;text-align:center;">Ingen treff — prøv et annet søkeord</p>';
  }

  // ─── RENDER ──────────────────────────────────────────────────────────
  function renderVert(v) {
    var tagsHtml = v.tags.slice(0,3).map(function(t) {
      var dot = t === 'Åpen nå' ? '<span class="pulse-dot"></span>' : '';
      var cls = t === 'Åpen nå' ? 'tag open' : 'tag';
      return '<span class="' + cls + '">' + dot + t + '</span>';
    }).join('');
    var score = Math.min(v.tags.length, 5);
    return '<div class="listing" onclick="openProfile(' + v.id + ')" style="cursor:pointer;">' +
      '<div class="listing-avatar">' + v.emoji + '</div>' +
      '<div class="listing-body">' +
        '<div class="listing-name">' + v.navn + '</div>' +
        '<div class="listing-addr">' + v.gate + ', Oslo</div>' +
        '<div class="listing-tags">' + tagsHtml + '</div>' +
      '</div>' +
      '<div class="listing-meta">' +
        '<div class="listing-dist">' + v.dist + '</div>' +
        '<div class="nabodo-score">⭐ ' + score + '/5</div>' +
        '<div class="listing-rating">★ ' + v.rating + ' · ' + v.besok + ' besøk</div>' +
        '<button class="listing-action" onclick="event.stopPropagation();openProfile(' + v.id + ')">Se profil</button>' +
      '</div>' +
    '</div>';
  }

  function renderListings() {
    var filtered;
    if (aktivtOmrade === 'alle' || aktivtOmrade === 'tag_alle') {
      filtered = verter;
    } else if (aktivtOmrade.startsWith('tag_')) {
      var tag = aktivtOmrade.replace('tag_', '');
      var tagMap = {
        lading: 'Lading', kjol: 'Kjøl', vann: 'vannflaske', solkrem: 'solkrem',
        paraply: 'paraply', kaffe: 'kaffe', musikk: 'Musikk', gitar: 'gitar',
        bok: 'bok', pledd: 'pledd', sport: 'badminton', fotball: 'spille',
        luft: 'Luft', barnemat: 'barnemat', forstehjelp: 'førstehjelp', hjertestarter: 'Hjertestarter'
      };
      var needle = tagMap[tag] || tag;
      filtered = verter.filter(function(v) { return v.tags.some(function(t) { return t.includes(needle); }); });
    } else {
      filtered = verter.filter(function(v) { return v.omrade === aktivtOmrade; });
    }
    document.getElementById('listings-container').innerHTML = filtered.map(renderVert).join('');
  }

  // ─── PROFILE MODAL ───────────────────────────────────────────────────
  var currentVert = null;

  function openProfile(id) {
    var v = verter.find(function(x) { return x.id === id; });
    currentVert = v;
    document.getElementById('profile-avatar').textContent = v.emoji;
    document.getElementById('profile-name').textContent = v.navn;
    document.getElementById('profile-area').textContent = v.gate + ' · ' + v.omradeNavn + ' · ' + v.dist;
    document.getElementById('profile-rating').textContent = '★ ' + v.rating + ' · ' + v.besok + ' besøk · ' + (v.open ? '✅ Åpen nå' : '⏱ Sjekk tidspunkt');
    document.getElementById('profile-tags').innerHTML = v.tags.map(function(t) { return '<span class="profile-tag">' + t + '</span>'; }).join('');
    document.getElementById('profile-note').innerHTML = '💬 ' + v.notat;
    document.getElementById('profile-reviews').innerHTML = '<div style="font-size:12px;font-weight:500;color:#999;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">Anmeldelser</div>' +
      v.reviews.map(function(r) { return '<div class="review-item">' + r.tekst + ' <span style="color:#bbb;font-size:11px;">' + r.dato + '</span></div>'; }).join('');
    var btn = document.getElementById('profile-action-btn');
    btn.textContent = v.open ? 'Gi beskjed om at jeg kommer →' : 'Send forespørsel →';
    btn.onclick = function() { closeProfile(); showToast('Melding sendt til ' + v.navn + '!'); };
    document.getElementById('profile-modal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function closeProfile() {
    document.getElementById('profile-modal').style.display = 'none';
    document.body.style.overflow = '';
  }

  function openInMaps() {
    if (!currentVert) return;
    var addr = encodeURIComponent(currentVert.gate + ', Oslo, Norway');
    var isIOS = /iPhone|iPad/i.test(navigator.userAgent);
    window.open(isIOS ? 'maps://maps.apple.com/?q=' + addr : 'https://www.google.com/maps/search/?api=1&query=' + addr, '_blank');
  }

  function copyAddress() {
    if (!currentVert) return;
    navigator.clipboard.writeText(currentVert.gate + ', Oslo').then(function() {
      showToast('Adresse kopiert!');
      var btn = document.getElementById('profile-copy-btn');
      btn.textContent = '✓ Kopiert!';
      setTimeout(function() { btn.textContent = '📋 Kopier adresse'; }, 2000);
    });
  }

  function shareNabodo() {
    if (navigator.share) {
      navigator.share({title:'Nabodo',text:'Finn et toalett hos en nabo.',url:'https://nabodo.no'});
    } else {
      navigator.clipboard.writeText('https://nabodo.no');
      showToast('Lenke kopiert: nabodo.no');
    }
  }

  // ─── TOAST ───────────────────────────────────────────────────────────
  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = '✓ ' + msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 3000);
  }

  // ─── STATS ───────────────────────────────────────────────────────────
  function updateStats() {
    var total = verter.length;
    var open = verter.filter(function(v) { return v.open; }).length;
    var visits = verter.reduce(function(a, v) { return a + v.besok; }, 0);
    document.getElementById('stats-bar').innerHTML =
      '<strong style="color:var(--green-dark)">' + open + ' åpne nå</strong> av ' + total + ' verter · <strong style="color:var(--green-dark)">' + visits + '</strong> besøk totalt';
  }

  // ─── COUNTER ─────────────────────────────────────────────────────────
  function animateCounter(el, target, duration) {
    var start = 0;
    var step = Math.ceil(target / (duration / 16));
    var timer = setInterval(function() {
      start += step;
      if (start >= target) { start = target; clearInterval(timer); }
      el.textContent = start;
    }, 16);
  }

  // ─── FEED ────────────────────────────────────────────────────────────
  function liveTid(min) {
    if (min < 60) return min + ' min siden';
    if (min < 1440) return Math.floor(min/60) + ' timer siden';
    return 'i går';
  }

  var feedPosts = [
    {emoji:"👩‍🦰",navn:"Silje M.",omrade:"Sagene",tekst:"Noen som vil spille badminton på Myraløkka i dag rundt kl 15? Har racket til to! 🏸",tag:"⚽ Aktivitet",tid:liveTid(14)},
    {emoji:"🧔‍♂️",navn:"Magnus T.",omrade:"Torshov",tekst:"Kaffe og vinyl på Torshov i ettermiddag — alle naboer velkomne! Ring på 34.",tag:"👋 Sosialt",tid:liveTid(32)},
    {emoji:"👩🏾‍🦱",navn:"Aisha M.",omrade:"Sofienbergparken",tekst:"Piknik i Sofienbergparken på lørdag — noen som vil bli med? Tar med ekstra pledd 🛋️",tag:"🌳 Parkaktivitet",tid:liveTid(67)},
    {emoji:"👨🏽",navn:"Diego R.",omrade:"Cuba — Grünerløkka",tekst:"Kubansk gitarkveld fredag kl 19. Åpen for alle naboer. Medbrakt drikke, jeg tar gitaren! 🎸",tag:"🎵 Musikk",tid:liveTid(127)},
    {emoji:"👩‍🦳",navn:"Marie S.",omrade:"St. Hanshaugen",tekst:"Har to pledd ledig til helgen — lånes ut gratis til parkbesøkende. Send melding! 🛋️",tag:"🛋️ Utlån",tid:liveTid(195)},
    {emoji:"🧔",navn:"Geir A.",omrade:"Tøyenparken",tekst:"Påminnelse: Hjertestarter og HLR-sertifisert. Ring på 44 ved behov. 💗",tag:"💗 Beredskap",tid:liveTid(1500)}
  ];

  function renderFeed() {
    document.getElementById('feed-container').innerHTML = feedPosts.map(function(p) {
      return '<div class="feed-post"><div class="feed-post-header"><span class="feed-post-avatar">' + p.emoji + '</span><div><div style="font-size:14px;font-weight:500;color:var(--text)">' + p.navn + '</div><div class="feed-post-meta">' + p.omrade + ' · ' + p.tid + '</div></div></div><div class="feed-post-text">' + p.tekst + '</div><span class="feed-post-tag">' + p.tag + '</span></div>';
    }).join('');
  }

  // ─── FADE IN ─────────────────────────────────────────────────────────
  function initFadeIn() {
    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, {threshold: 0.1});
    document.querySelectorAll('.fade-in').forEach(function(el) { obs.observe(el); });
  }

  // ─── PWA ─────────────────────────────────────────────────────────────
  var deferredPrompt;
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    var btn = document.getElementById('pwa-install-btn');
    if (btn) {
      btn.style.display = 'block';
      btn.addEventListener('click', function() {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function(r) {
          if (r.outcome === 'accepted') { btn.style.display = 'none'; showToast('Nabodo er installert! 🎉'); }
          deferredPrompt = null;
        });
      });
    }
  });
  window.addEventListener('appinstalled', function() {
    var s = document.getElementById('pwa-section');
    if (s) s.style.display = 'none';
  });

  var pwaText = document.getElementById('pwa-text');
  if (pwaText) {
    var ua = navigator.userAgent;
    if (/iPhone|iPad/i.test(ua)) pwaText.innerHTML = 'iPhone: Trykk del-knappen i Safari → <strong style="color:#a8d5b5;">«Legg til på hjemskjerm»</strong>.';
    else if (/Android/i.test(ua)) pwaText.innerHTML = 'Android: Trykk menyknappen i Chrome → <strong style="color:#a8d5b5;">«Legg til på startskjerm»</strong>.';
    else pwaText.innerHTML = 'Desktop: Klikk installikonet i adressefeltet → <strong style="color:#a8d5b5;">«Installer app»</strong>.';
  }

  // ─── SERVICE WORKER ──────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() { navigator.serviceWorker.register('/sw.js'); });
  }

  // ─── INIT ─────────────────────────────────────────────────────────────
  renderListings();
  updateStats();
  renderFeed();
  initFadeIn();

  var counterEl = document.getElementById('vert-counter');
  if (counterEl) setTimeout(function() { animateCounter(counterEl, 47, 1800); }, 500);

  if (window.location.hash === '#takk') {
    var el = document.getElementById('takk');
    if (el) el.style.display = 'block';
  }

</script>
</body>
</html>
